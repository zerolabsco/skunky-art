<!DOCTYPE html>
<html>
    {{template "head" . }}
    <main>
        {{template "header" . }}
        
        {{if ne .Templates.Search.List ""}}
        {{if ne .Templates.Search.Content.Total 0}}
        <h1>Results by request '{{.QueryRaw}}': {{.Templates.Search.Content.Total}}</h1>
        {{end}}
        {{.Templates.Search.List}}
        {{else}}
        <p>No results :(</p>
        {{end}}
    </main>
</html>
